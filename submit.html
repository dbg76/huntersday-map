<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8"/>
<title>Hunters Day – Add Your Paddle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f2f2f2;
}

header{
background:#0e2341;
color:white;
padding:18px;
text-align:center;
}

.wrap{
max-width:900px;
margin:auto;
padding:16px;
}

.card{
background:white;
border-radius:12px;
padding:16px;
margin-bottom:16px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

label{
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin:8px 0 14px 0;
border-radius:8px;
border:1px solid #ccc;
}

#map{
height:420px;
border-radius:12px;
}

button{
width:100%;
background:#0e2341;
color:white;
border:none;
padding:14px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.guide{
background:#f7f7f7;
padding:10px;
border-radius:8px;
margin-bottom:14px;
}

</style>
</head>

<body>

<header>
<h1>Add Your Paddle</h1>
<p>Join paddlers across the UK supporting hospice care</p>
</header>

<div class="wrap">

<div class="card guide">

<b>How to take part</b>

<ol>

<li>Go paddling on Hunters Day</li>
<li>Open this page</li>
<li>Tap the map where you paddled</li>
<li>Enter your group and paddler count</li>
<li>Submit to add your pin</li>

</ol>

</div>

<div class="card">

<label>Group Name</label>
<input id="group" placeholder="e.g. Colchester Canoe Club">

<label>Number of paddlers</label>
<input id="paddlers" type="number">

<label>Optional photo link</label>
<input id="photo">

<div id="map"></div>

<button id="submitBtn">Submit to Hunters Day Map</button>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const FORM_ACTION="https://docs.google.com/forms/d/e/1FAIpQLSf7PXO87sAMQsV3b-vZSnsQXdnMQv1tW_YWznF8tc5TcRs6Rg/formResponse";

const FIELD_GROUP="entry.712164457";
const FIELD_PIN="entry.664612782";
const FIELD_PADDLERS="entry.1531351935";
const FIELD_PHOTO="entry.1535912600";

const map=L.map("map",{center:[54.5,-3],zoom:6});

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);

let marker=null;
let coords="";

map.on("click",function(e){

coords=e.latlng.lat+","+e.latlng.lng;

if(marker)map.removeLayer(marker);

marker=L.marker(e.latlng).addTo(map);

});

async function submit(){

const group=document.getElementById("group").value;
const paddlers=document.getElementById("paddlers").value;
const photo=document.getElementById("photo").value;

if(!group||!paddlers||!coords){

alert("Please complete all fields and drop a map pin");

return;

}

document.getElementById("submitBtn").disabled=true;

const formData=new FormData();

formData.append(FIELD_GROUP,group);
formData.append(FIELD_PIN,coords);
formData.append(FIELD_PADDLERS,paddlers);
formData.append(FIELD_PHOTO,photo);

await fetch(FORM_ACTION,{method:"POST",mode:"no-cors",body:formData});

alert("Thank you — your paddle has been added to the map");

}

document.getElementById("submitBtn").onclick=submit;

</script>

</body>
</html>
