<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Hunters Day – Add Your Paddle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f2f2f2;
}

header{
  background:#0e2341;
  color:white;
  padding:18px;
  text-align:center;
}

.wrap{
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card{
  background:white;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

label{
  font-weight:bold;
  display:block;
  margin-top:10px;
}

input{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin:8px 0 14px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

#map{
  height:420px;
  border-radius:12px;
  margin-top:8px;
}

button{
  width:100%;
  background:#0e2341;
  color:white;
  border:none;
  padding:14px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
  margin-top:14px;
}

button:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.guide{
  background:#f7f7f7;
  padding:10px;
  border-radius:8px;
  margin-bottom:14px;
}

.status{
  margin-top:12px;
  font-weight:bold;
  color:#0e2341;
  white-space:pre-line;
}

.honeypot{
  position:absolute !important;
  left:-9999px !important;
  width:1px !important;
  height:1px !important;
  overflow:hidden !important;
}
</style>
</head>

<body>

<header>
  <h1>Add Your Paddle</h1>
  <p>Join paddlers across the UK supporting hospice care</p>
</header>

<div class="wrap">

  <div class="card guide">
    <b>How to take part</b>
    <ol>
      <li>Go paddling on Hunters Day</li>
      <li>Open this page</li>
      <li>Tap the map where you paddled</li>
      <li>Enter your group and paddler count</li>
      <li>Submit to add your pin</li>
    </ol>
  </div>

  <div class="card">

    <label for="group">Group Name</label>
    <input id="group" placeholder="e.g. Colchester Canoe Club" maxlength="100">

    <label for="paddlers">Number of paddlers</label>
    <input id="paddlers" type="number" min="1" max="100" inputmode="numeric">

    <label for="photo">Optional photo link</label>
    <input id="photo" placeholder="https://...">

    <div class="honeypot" aria-hidden="true">
      <label for="website">Website</label>
      <input id="website" name="website" tabindex="-1" autocomplete="off">
    </div>

    <label>Tap the map to drop your pin</label>
    <div id="map"></div>

    <button id="submitBtn" type="button">Submit to Hunters Day Map</button>

    <div id="status" class="status"></div>

  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<form
  id="googleForm"
  action="https://docs.google.com/forms/d/e/1FAIpQLSf7PXO87sAMQsV3b-vZSnsQXdnMQv1tW_YWznF8tc5TcRs6Rg/formResponse"
  method="POST"
  target="hidden_iframe"
  style="display:none;"
>
  <input name="entry.712164457" id="form_group">
  <input name="entry.664612782" id="form_pin">
  <input name="entry.1531351935" id="form_paddlers">
  <input name="entry.1535912600" id="form_photo">
</form>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const MIN_SECONDS_ON_PAGE = 20;
const COOLDOWN_SECONDS = 60;
const MIN_PADDLERS = 1;
const MAX_PADDLERS = 100;
const LAST_SUBMIT_KEY = "huntersday_last_submit_ts";

const BLOCKED_WORDS = [
  "fuck","fucking","shit","cunt","bitch","wanker","twat","prick","dickhead","arsehole","bastard"
];

const pageOpenedAt = Date.now();

const map = L.map("map", {
  center:[54.5,-3],
  zoom:6
});

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    maxZoom:19,
    attribution:"© OpenStreetMap contributors"
  }
).addTo(map);

let marker = null;
let coords = "";

map.on("click", function(e){
  coords = e.latlng.lat.toFixed(6) + "," + e.latlng.lng.toFixed(6);

  if(marker){
    map.removeLayer(marker);
  }

  marker = L.marker(e.latlng).addTo(map);
  document.getElementById("status").textContent = "Pin selected: " + coords;
});

function parseCoords(text){
  if(!text) return null;
  const match = String(text).match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
  if(!match) return null;

  const lat = Number(match[1]);
  const lng = Number(match[2]);

  if(Number.isNaN(lat) || Number.isNaN(lng)) return null;
  if(lat < -90 || lat > 90) return null;
  if(lng < -180 || lng > 180) return null;

  return { lat, lng };
}

function containsBlockedWord(text){
  const lower = text.toLowerCase();
  return BLOCKED_WORDS.some(word => lower.includes(word));
}

function secondsOnPage(){
  return Math.floor((Date.now() - pageOpenedAt) / 1000);
}

function cooldownRemaining(){
  const lastSubmit = Number(localStorage.getItem(LAST_SUBMIT_KEY) || 0);
  if(!lastSubmit) return 0;

  const elapsed = Math.floor((Date.now() - lastSubmit) / 1000);
  const remaining = COOLDOWN_SECONDS - elapsed;
  return remaining > 0 ? remaining : 0;
}

function validateSubmission(group, paddlersValue, photo){
  const status = document.getElementById("status");

  if(document.getElementById("website").value.trim() !== ""){
    status.textContent = "Submission blocked.";
    return false;
  }

  if(secondsOnPage() < MIN_SECONDS_ON_PAGE){
    const wait = MIN_SECONDS_ON_PAGE - secondsOnPage();
    status.textContent = `Please wait ${wait} more second${wait === 1 ? "" : "s"} before submitting.`;
    return false;
  }

  const cooldown = cooldownRemaining();
  if(cooldown > 0){
    status.textContent = `Please wait ${cooldown} more second${cooldown === 1 ? "" : "s"} before making another submission from this browser.`;
    return false;
  }

  if(!group || group.trim().length < 2){
    status.textContent = "Please enter a valid group name.";
    return false;
  }

  if(containsBlockedWord(group)){
    status.textContent = "Please use a suitable group name.";
    return false;
  }

  const paddlers = Number(paddlersValue);
  if(!Number.isInteger(paddlers) || paddlers < MIN_PADDLERS || paddlers > MAX_PADDLERS){
    status.textContent = `Paddler count must be a whole number between ${MIN_PADDLERS} and ${MAX_PADDLERS}.`;
    return false;
  }

  const parsed = parseCoords(coords);
  if(!parsed){
    status.textContent = "Please drop a valid map pin.";
    return false;
  }

  if(photo){
    try{
      const url = new URL(photo);
      if(url.protocol !== "http:" && url.protocol !== "https:"){
        status.textContent = "Photo link must start with http:// or https://";
        return false;
      }
    }catch{
      status.textContent = "Photo link must be a valid URL, or leave it blank.";
      return false;
    }
  }

  return true;
}

function resetForm(){
  document.getElementById("group").value = "";
  document.getElementById("paddlers").value = "";
  document.getElementById("photo").value = "";
  document.getElementById("website").value = "";

  if(marker){
    map.removeLayer(marker);
    marker = null;
  }

  coords = "";
}

function submitPaddle(){
  const group = document.getElementById("group").value.trim();
  const paddlers = document.getElementById("paddlers").value.trim();
  const photo = document.getElementById("photo").value.trim();
  const btn = document.getElementById("submitBtn");
  const status = document.getElementById("status");

  if(!validateSubmission(group, paddlers, photo)){
    return;
  }

  document.getElementById("form_group").value = group;
  document.getElementById("form_pin").value = coords;
  document.getElementById("form_paddlers").value = paddlers;
  document.getElementById("form_photo").value = photo;

  btn.disabled = true;
  status.textContent = "Submitting...";

  document.getElementById("googleForm").submit();
  localStorage.setItem(LAST_SUBMIT_KEY, String(Date.now()));

  setTimeout(function(){
    status.textContent = "Thank you — your paddle has been submitted.";
    alert("Thank you — your paddle has been added to the map");

    resetForm();
    btn.disabled = false;
  }, 1200);
}

document.getElementById("submitBtn").addEventListener("click", submitPaddle);
</script>

</body>
</html>
