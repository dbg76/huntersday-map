<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hunters Day Live Participation Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    .topbar {
      background: #0E2341;
      color: white;
      padding: 16px;
      text-align: center;
    }

    .topbar h1 {
      margin: 0 0 6px 0;
      font-size: 24px;
    }

    .topbar p {
      margin: 0;
      font-size: 14px;
      opacity: 0.95;
    }

    .stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 12px;
      background: white;
      flex-wrap: wrap;
      border-bottom: 1px solid #ddd;
    }

    .stat-box {
      background: #ffffff;
      border: 2px solid #0E2341;
      border-radius: 10px;
      padding: 10px 16px;
      min-width: 140px;
      text-align: center;
    }

    .stat-box .label {
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }

    .stat-box .value {
      font-size: 24px;
      font-weight: bold;
      color: #0E2341;
    }

    #map {
      height: calc(100vh - 170px);
      width: 100%;
    }

    .status {
      padding: 10px;
      text-align: center;
      color: #444;
      background: #fff8dc;
      border-bottom: 1px solid #ddd;
      display: none;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Hunters Day Live Participation Map</h1>
    <p>Paddlers across the UK supporting hospice care</p>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="label">Total Clubs</div>
      <div class="value" id="clubCount">0</div>
    </div>
    <div class="stat-box">
      <div class="label">Total Paddlers</div>
      <div class="value" id="paddlerCount">0</div>
    </div>
  </div>

  <div class="status" id="statusBox"></div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const SHEET_ID = "1_6stM63d7umTSeHUEUkD04_Zic4nt2nHkxgP8nBCWMI";
    const SHEET_NAME = "Form Responses 1";

    const map = L.map('map').setView([54.5, -3], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markers = [];

    function showStatus(message) {
      const box = document.getElementById("statusBox");
      box.style.display = "block";
      box.textContent = message;
    }

    function hideStatus() {
      const box = document.getElementById("statusBox");
      box.style.display = "none";
      box.textContent = "";
    }

    async function loadSheetData() {
      const url =
        `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tqx=out:json`;

      try {
        showStatus("Loading live participation data...");

        const response = await fetch(url);
        const text = await response.text();

        const jsonText = text.match(/setResponse\(([\s\S]+)\);/)[1];
        const data = JSON.parse(jsonText);

        const rows = data.table.rows || [];

        let totalClubs = 0;
        let totalPaddlers = 0;
        const bounds = [];

        rows.forEach((row) => {
          const cells = row.c || [];

          const club = cells[1]?.v ? String(cells[1].v).trim() : "";
          const paddlersRaw = cells[3]?.v;
          const latRaw = cells[4]?.v;
          const lngRaw = cells[5]?.v;

          if (club) {
            totalClubs += 1;
          }

          const paddlers = Number(paddlersRaw) || 0;
          totalPaddlers += paddlers;

          const lat = Number(latRaw);
          const lng = Number(lngRaw);

          if (!isNaN(lat) && !isNaN(lng)) {
            const marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<b>${club || "Unnamed entry"}</b><br>Paddlers: ${paddlers}`);
            markers.push(marker);
            bounds.push([lat, lng]);
          }
        });

        document.getElementById("clubCount").textContent = totalClubs;
        document.getElementById("paddlerCount").textContent = totalPaddlers;

        if (bounds.length === 1) {
          map.setView(bounds[0], 8);
        } else if (bounds.length > 1) {
          map.fitBounds(bounds, { padding: [30, 30] });
        }

        hideStatus();

        if (bounds.length === 0) {
          showStatus("No valid map coordinates found yet. Counters are live, but pins need latitude and longitude in the sheet.");
        }

      } catch (error) {
        console.error(error);
        showStatus("Could not load live sheet data yet.");
      }
    }

    loadSheetData();
  </script>
</body>
</html>
