



<!DOCTYPE html>



<html>



<head>



<meta charset=”utf-8”/>



<title>Hunters Day Live Participation
Map</title>



<meta name=”viewport” content=”width=device-width,
initial-scale=1.0, viewport-fit=cover”>



 



<link rel=”stylesheet” href=https://unpkg.com/leaflet/dist/leaflet.css/>



<link rel=”stylesheet” href=https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css/>



 



<style>



Html, body{



Margin:0;



Padding:0;



Height:100%;



Font-family:Arial,Helvetica,sans-serif;



Background:#f2f2f2;



}



 



Body{



Display:flex;



Flex-direction:column;



Height:100dvh;



Overflow:hidden;



}



 



Header{



Background:#0e2341;



Color:white;



Padding:6px 8px 5px 8px;



Text-align:center;



}



 



Header h1{



Margin:0;



Font-size:16px;



Line-height:1.05;



}



 



Header p{



Margin:2px 0 0 0;



Font-size:10px;



}



 



.banner{



Background:#f6a800;



Color:#0e2341;



Font-weight:bold;



Text-align:center;



Padding:4px 6px;



Font-size:12px;



}



 



.controls{



Display:flex;



Justify-content:center;



Align-items:center;



Gap:6px;



Padding:4px 6px;



Background:white;



Flex-wrap:wrap;



}



 



Button{



Background:#0e2341;



Color:white;



Border:none;



Padding:6px 10px;



Border-radius:6px;



Cursor:pointer;



Font-size:12px;



}



 



.stats{



Display:flex;



Justify-content:center;



Gap:6px;



Padding:4px 6px;



Background:white;



Flex-wrap:wrap;



}



 



.stat{



Border:2px solid #0e2341;



Border-radius:10px;



Padding:4px 10px;



Text-align:center;



Min-width:96px;



Background:white;



}



 



.stat h3{



Margin:0;



Font-size:10px;



Color:#666;



Font-weight:normal;



}



 



.stat p{



Margin:2px 0 0 0;



Font-size:17px;



Font-weight:bold;



Color:#0e2341;



}



 



#lastUpdate{



Color:#0e2341;



Font-weight:bold;



Font-size:11px;



}



 



#mapWrap{



Position:relative;



Flex:1;



Min-height:0;



}



 



#map{



Width:100%;



Height:100%;



}



 



.watermark{



Position:absolute;



Bottom:10px;



Left:10px;



Background:rgba(255,255,255,0.88);



Padding:6px 10px;



Border-radius:6px;



Font-size:12px;



z-index:500;



}



 



.add-paddle-link{



Position:absolute;



Right:14px;



Bottom:56px;



z-index:600;



text-align:center;



}



 



.add-paddle-btn{



Background:#f6a800;



Color:#0e2341;



Font-weight:bold;



Padding:10px 14px;



Border-radius:8px;



Border:none;



Font-size:13px;



Box-shadow:0 2px 8px rgba(0,0,0,0.18);



}



 



.add-paddle-btn:disabled{



Opacity:0.65;



Cursor:not-allowed;



}



 



.add-note{



Margin-top:4px;



Font-size:11px;



Color:#0e2341;



Background:rgba(255,255,255,0.9);



Padding:3px 6px;



Border-radius:4px;



}



 



.marker-cluster-small,



.marker-cluster-medium,



.marker-cluster-large{



Background:transparent !important;



}



 



.marker-cluster-small div,



.marker-cluster-medium div,



.marker-cluster-large div{



Background:transparent !important;



Border:none !important;



Width:auto !important;



Height:auto !important;



Margin:0 !important;



Border-radius:0 !important;



Box-shadow:none !important;



Color:inherit !important;



Font:inherit !important;



}



 



.hd-cluster-wrap{



Position:relative;



Width:18px;



Height:27px;



}



</style>



</head>



 



<body>



 



<header>



<h1>Hunters Day Live Participation Map</h1>



<p>Paddlers across the UK supporting hospice
care</p>



</header>



 



<div class=”banner” id=”liveBanner”>



Loading participation...



</div>



 



<div class=”controls”>



<button onclick=”loadData()”>Refresh
Map</button>



<button onclick=”shareMap()”>Share Map</button>



<span id=”lastUpdate”></span>



</div>



 



<div class=”stats”>



<div class=”stat”>



<h3>Total Groups</h3>



<p id=”groups”>0</p>



</div>



 



<div class=”stat”>



<h3>Total Paddlers</h3>



<p id=”paddlers”>0</p>



</div>



</div>



 



<div id=”mapWrap”>



<div id=”map”></div>



 



<div class=”add-paddle-link”>



<button class=”add-paddle-btn” disabled>Add Your
Paddle</button>



<div class=”add-note”>Activates on Hunters
Day</div>



</div>



 



<div class=”watermark”>Hunters Day • Supporting
Hospice Care</div>



</div>



 



<script src=https://unpkg.com/leaflet/dist/leaflet.js></script>



<script src=https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js></script>



 



<script>



 



/* YOUR ORIGINAL SCRIPT REMAINS IDENTICAL BELOW */



 



Const
SHEET_ID=”1_6stM63d7umTSeHUEUkD04_Zic4nt2nHkxgP8nBCWMI”;



Const SHEET_NAME=”Form Responses 1”;



 



Const OFFSET_X=-25;



Const OFFSET_Y=60;



 



Const UK_VIEW_BOUNDS=[[49.8,-8.7],[60.9,2.1]];



 



Let isLoading=false;



Let startupScheduled=false;



 



Const
map=L.map(“map”,{zoomControl:true,minZoom:4.8,maxZoom:18,zoomSnap:0.1});



 



L.tileLayer(



https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png,



{attribution:”© OpenStreetMap contributors ©
CARTO”,subdomains:”abcd”,maxZoom:20}



).addTo(map);



 



Function resetToUKView(){



Map.fitBounds(UK_VIEW_BOUNDS,{animate:false,padding:[8,8],maxZoom:5.3});



Map.invalidateSize();



setTimeout(()=>{map.panBy([OFFSET_X,OFFSET_Y],{animate:false});},60);



}



 



Function makePinSvg(label){



Return `<svg xmlns=http://www.w3.org/2000/svg
width=”18” height=”27” viewBox=”0 0 28 42”>



<path d=”M14 40 C14 40 20.5 27 22.5 21.5 C23.8 18.2 24.2
15.1 24.2 12.5 C24.2 5.9 19.9 2 14 2 C8.1 2 3.8 5.9 3.8 12.5 C3.8 15.1 4.2 18.2
5.5 21.5 C7.5 27 14 40 14 40 Z”



Fill=”#0e2341” stroke=”#0e2341” stroke-width=”1.5”/>



<ellipse cx=”14” cy=”11.5” rx=”8.4” ry=”8.4”
fill=”#0e2341”/>



<text x=”14” y=”15.4” text-anchor=”middle”



Font-family=”Arial”
font-size=”${String(label).length>1?8:9}”



Font-weight=”bold” fill=”#f6e81b”>${label}</text>



</svg>`;



}



 



Const hdPinSvg=makePinSvg(“HD”);



 



Const sharedPinIcon=L.icon({



iconUrl:”data:image/svg+xml;charset=UTF-8,”+encodeURIComponent(hdPinSvg),



iconSize:[18,27],



iconAnchor:[9,27],



popupAnchor:[0,-22]



});



 



Function createClusterIcon(count){



Const clusterSvg=makePinSvg(String(count));



Return L.divIcon({



Html:`<div class=”hd-cluster-wrap”>



<img
src=”data:image/svg+xml;charset=UTF-8,${encodeURIComponent(clusterSvg)}”
width=”18” height=”27”>



</div>`,



className:””,



iconSize:[18,27],



iconAnchor:[9,27]



});



}



 



Const markers=L.markerClusterGroup({



showCoverageOnHover:false,



spiderfyOnMaxZoom:true,



removeOutsideVisibleBounds:false,



maxClusterRadius:40,



iconCreateFunctionLcluster)=>createClusterIcon(cluster.getChildCount())



});



 



Map.addLayer(markers);



 



Function parseCoords(text){



If(!text) return null;



Const
m=String(text).match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);



If(m){return{lat:Number(m[1]),lng:Number(m[2])};}



Return null;



}



 



Async function loadData(){



If(isLoading) return;



isLoading=true;



 



const
url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tqx=out:json`;



 



try{



const res=await fetch(url,{cache:”no-store”});



const text=await res.text();



const match=text.match(/setResponse\(([\s\S]+)\);/);



if(!match) throw new Error();



 



const json=JSON.parse(match[1]);



const rows=json.table.rows||[];



 



markers.clearLayers();



 



let groupCount=0;



let paddlerTotal=0;



 



rows.forEach(row=>{



const c=row.c||[];



const group=c[2]?.v?String(c[2].v).trim():””;



const pin=c[3]?.v?String(c[3].v).trim():””;



const paddlers=Number(c[6]?.v)||0;



const coords=parseCoords(pin);



 



if(group&&coords){



groupCount++;



paddlerTotal+=paddlers;



 



const
marker=L.marker([coords.lat,coords.lng],{icon:sharedPinIcon})



.bindPopup(`<b>${group}</b><br>Paddlers:
${paddlers}`);



 



Markers.addLayer(marker);



}



});



 



Markers.refreshClusters();



 



Document.getElementById(“groups”).textContent=groupCount;



Document.getElementById(“paddlers”).textContent=paddlerTotal;



Document.getElementById(“liveBanner”).textContent=



`${paddlerTotal} paddlers on the water • ${groupCount}
groups taking part`;



 



Const now=new Date();



Document.getElementById(“lastUpdate”).textContent=



“Last updated “+now.toLocaleTimeString([],
{hour:”2-digit”,minute:”2-digit”});



 



resetToUKView();



 



}catch{



Document.getElementById(“liveBanner”).textContent=”Could not
load participation data”;



resetToUKView();



}



 



isLoading=false;



}



 



Function shareMap(){



Const url=window.location.href;



Navigator.clipboard.writeText(url);



Alert(“Map link copied to clipboard”);



}



 



Function scheduleStartupLoad(){



If(startupScheduled) return;



startupScheduled=true;



 



map.invalidateSize();



 



setTimeout(()=>{loadData();},600);



setTimeout(()=>{



const
stillEmpty=document.getElementById(“groups”).textContent===”0”;



if(stillEmpty&&!isLoading){loadData();}



},1800);



}



 



Window.addEventListener(“load”,scheduleStartupLoad);



Window.addEventListener(“pageshow”,scheduleStartupLoad);



 



</script>



 



</body>



</html>
