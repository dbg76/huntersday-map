<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Hunters Day Live Participation Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f2f2f2;
}

header{
background:#0e2341;
color:white;
padding:12px 10px 10px 10px;
text-align:center;
}

header h1{
margin:0;
font-size:20px;
line-height:1.1;
}

header p{
margin:4px 0 0 0;
font-size:12px;
}

.banner{
background:#f6a800;
color:#0e2341;
font-weight:bold;
text-align:center;
padding:6px;
font-size:13px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:6px;
background:white;
flex-wrap:wrap;
}

button{
background:#0e2341;
color:white;
border:none;
padding:7px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.stats{
display:flex;
justify-content:center;
gap:8px;
padding:6px;
background:white;
flex-wrap:wrap;
}

.stat{
border:2px solid #0e2341;
border-radius:10px;
padding:6px 12px;
text-align:center;
min-width:110px;
background:white;
}

.stat h3{
margin:0;
font-size:11px;
color:#666;
font-weight:normal;
}

.stat p{
margin:3px 0 0 0;
font-size:19px;
font-weight:bold;
color:#0e2341;
}

#map{
height:calc(100vh - 60px);
width:100%;
}

.watermark{
position:absolute;
bottom:10px;
left:10px;
background:rgba(255,255,255,0.88);
padding:6px 10px;
border-radius:6px;
font-size:12px;
z-index:500;
}

#lastUpdate{
color:#0e2341;
font-weight:bold;
font-size:12px;
}

/* remove default cluster bubble styling */

.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large{
background:transparent !important;
}

.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div{
background:transparent !important;
border:none !important;
width:auto !important;
height:auto !important;
margin:0 !important;
border-radius:0 !important;
color:inherit !important;
font:inherit !important;
}

.hd-cluster-wrap{
position:relative;
width:22px;
height:33px;
}

</style>
</head>

<body>

<header>
<h1>Hunters Day Live Participation Map</h1>
<p>Paddlers across the UK supporting hospice care</p>
</header>

<div class="banner" id="liveBanner">
Loading participation...
</div>

<div class="controls">
<button onclick="loadData()">Refresh Map</button>
<button onclick="shareMap()">Share Map</button>
<span id="lastUpdate"></span>
</div>

<div class="stats">

<div class="stat">
<h3>Total Groups</h3>
<p id="groups">0</p>
</div>

<div class="stat">
<h3>Total Paddlers</h3>
<p id="paddlers">0</p>
</div>

</div>

<div id="map"></div>

<div class="watermark">
Hunters Day • Supporting Hospice Care
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>

const SHEET_ID="1_6stM63d7umTSeHUEUkD04_Zic4nt2nHkxgP8nBCWMI";
const SHEET_NAME="Form Responses 1";

const ukBounds=[[49.5,-10.5],[61.2,3.0]];
const ukViewBounds=[[49.8,-8.7],[60.9,2.1]];

const map=L.map("map",{zoomControl:true,minZoom:5,maxZoom:18,maxBoundsViscosity:0.35});

map.setMaxBounds(ukBounds);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
{
attribution:"© OpenStreetMap contributors © CARTO",
subdomains:"abcd",
maxZoom:20
}
).addTo(map);

function makePinSvg(label){

return`
<svg xmlns="http://www.w3.org/2000/svg" width="44" height="66" viewBox="0 0 44 66">

<path d="M22 64
C22 64 32 42 35 33
C37 27 38 22 38 18
C38 7.5 31.2 2 22 2
C12.8 2 6 7.5 6 18
C6 22 7 27 9 33
C12 42 22 64 22 64 Z"

fill="#0e2341"
stroke="#0e2341"
stroke-width="2"/>

<ellipse cx="22" cy="17" rx="13.5" ry="13.5" fill="#0e2341"/>

<text
x="22"
y="22"
text-anchor="middle"
font-family="Arial, Helvetica, sans-serif"
font-size="${String(label).length>1?13:15}"
font-weight="bold"
fill="#f6e81b"
>${label}</text>

</svg>
`;

}

const hdPinSvg=makePinSvg("HD");

const hdIcon=L.icon({
iconUrl:"data:image/svg+xml;charset=UTF-8,"+encodeURIComponent(hdPinSvg),
iconSize:[44,66],
iconAnchor:[22,66],
popupAnchor:[0,-52]
});

function createClusterIcon(count){

const clusterSvg=makePinSvg(String(count));

return L.divIcon({

html:`
<div class="hd-cluster-wrap">
<img src="data:image/svg+xml;charset=UTF-8,${encodeURIComponent(clusterSvg)}" width="22" height="33">
</div>`,

className:"",
iconSize:[22,33],
iconAnchor:[11,33]

});

}

const markers=L.markerClusterGroup({

showCoverageOnHover:false,
spiderfyOnMaxZoom:true,
maxClusterRadius:40,

iconCreateFunction:function(cluster){
return createClusterIcon(cluster.getChildCount());
}

});

map.addLayer(markers);

function resetToUKView(){

map.fitBounds(ukViewBounds,{
padding:[4,4],
animate:false
});

}

function parseCoords(text){

if(!text)return null;

const match=String(text).match(/(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)/);

if(match){

return{
lat:Number(match[1]),
lng:Number(match[2])
};

}

return null;

}

async function loadData(){

markers.clearLayers();

const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tqx=out:json`;

try{

const response=await fetch(url);
const text=await response.text();

const match=text.match(/setResponse\(([\s\S]+)\);/);

if(!match)throw new Error("Could not parse Google Sheets response");

const json=JSON.parse(match[1]);
const rows=json.table.rows||[];

let groupCount=0;
let paddlerTotal=0;

rows.forEach(row=>{

const c=row.c||[];

const group=c[1]?.v?String(c[1].v).trim():"";
const pin=c[2]?.v?String(c[2].v).trim():"";
const paddlers=Number(c[6]?.v)||0;

if(group)groupCount++;

paddlerTotal+=paddlers;

const coords=parseCoords(pin);

if(coords){

const marker=L.marker([coords.lat,coords.lng],{icon:hdIcon})
.bindPopup(`<b>${group||"Unnamed group"}</b><br>Paddlers: ${paddlers}`);

markers.addLayer(marker);

}

});

document.getElementById("groups").textContent=groupCount;
document.getElementById("paddlers").textContent=paddlerTotal;

document.getElementById("liveBanner").textContent=
paddlerTotal+" paddlers on the water • "+groupCount+" groups taking part";

const now=new Date();

document.getElementById("lastUpdate").textContent=
"Last updated "+now.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

resetToUKView();

}

catch(error){

console.error(error);

document.getElementById("groups").textContent="0";
document.getElementById("paddlers").textContent="0";

document.getElementById("liveBanner").textContent=
"Could not load participation data";

resetToUKView();

}

}

function shareMap(){

const url=window.location.href;

if(navigator.share){

navigator.share({
title:"Hunters Day Live Participation Map",
text:"Paddlers across the UK supporting hospice care",
url:url
}).catch(()=>{});

return;

}

navigator.clipboard.writeText(url);
alert("Map link copied to clipboard");

}

window.addEventListener("load",function(){

setTimeout(function(){

map.invalidateSize();
resetToUKView();
loadData();

},150);

});

</script>

</body>
</html>
